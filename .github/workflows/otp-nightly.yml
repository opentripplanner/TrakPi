name: OTP nightly integration

# Runs the trakpi OTP reference against the Entur OTP dev API.
#
# TEMPORARY: scheduled every 10 minutes for verification. Once confirmed working, switch to the
# nightly line below (04:00 UTC — GitHub cron is always UTC, and runs are best-effort / may be
# delayed). Scheduled runs only fire from the default branch.
on:
  schedule:
    - cron: "*/10 * * * *" # TESTING: every 10 minutes
    # - cron: "0 4 * * *"  # nightly at 04:00 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build and install trakpi core
        run: mvn -B -f core/pom.xml install

      - name: Build the OTP reference
        run: mvn -B -f reference/otp/pom.xml package

      - name: Run trakpi test against OTP dev
        run: java --enable-native-access=ALL-UNNAMED -jar reference/otp/target/trakpi.jar test --version dev --config reference/otp/trakpi.properties
