name: OTP nightly integration

# Runs the trakpi OTP reference against the Entur OTP dev API, nightly.
#
# GitHub cron is UTC and best-effort (runs may be delayed). Scheduled runs only fire from the
# default branch.
on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC (~05:00/06:00 Norway). For ~04:00 local: "0 2 * * *" CEST / "0 3 * * *" CET.
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build and install trakpi core
        run: mvn -B -f core/pom.xml install

      - name: Build and install the file storage adapter
        run: mvn -B -f storage/file/pom.xml install

      - name: Build the OTP reference
        run: mvn -B -f reference/otp/pom.xml package

      - name: Run trakpi test against OTP dev
        run: java --enable-native-access=ALL-UNNAMED -jar reference/otp/target/trakpi.jar test --version dev --config reference/otp/trakpi.properties

      - name: Show results
        run: cat results/*.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: trakpi-results
          path: results/
          if-no-files-found: error
